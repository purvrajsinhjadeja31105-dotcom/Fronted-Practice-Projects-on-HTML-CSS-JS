<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator Pro</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="background-decor decor-1"></div>
  <div class="background-decor decor-2"></div>

  <div class="age-container">
    <h1>Age Calculator</h1>
    <p class="subtitle">Discover how many days until your next birthday!</p>
    <div class="form">
      <div class="input-group">
        <label for="birthday" id="label">Enter your date of birth</label>
        <input type="date" id="birthday" name="birthday">
      </div>
      <button type="button" id="calculate-age">Calculate Age</button>

      <div class="results-container">
        <p id="result">Your Age</p>
        <p id="extra-info">Enter your birth date above to calculate your exact age and next birthday.</p>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
