<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Rock Paper Scissors</h1>
      <p class="subtitle">Challenge the computer in a premium dark arena</p>
    </header>

    <section class="panel">
      <div class="scoreboard">
        <div class="score-item">
          <span class="score-label" id="player-one-label">You</span>
          <span id="user-score">0</span>
        </div>
        <div class="vs-badge">VS</div>
        <div class="score-item">
          <span class="score-label" id="player-two-label">Computer</span>
          <span id="comp-score">0</span>
        </div>
      </div>

      <div class="battlefield">
        <div class="choice-card user-card">
          <span class="choice-title">Your Choice</span>
          <span id="user-choice" class="choice-value">—</span>
        </div>
        <div class="choice-card comp-card">
          <span class="choice-title">Computer Choice</span>
          <span id="comp-choice" class="choice-value">—</span>
        </div>
      </div>

      <div class="buttons">
        <button class="move-button" id="rock" data-choice="rock">✊</button>
        <button class="move-button" id="paper" data-choice="paper">✋</button>
        <button class="move-button" id="scissor" data-choice="scissor">✌️</button>
      </div>

      <p class="result" id="result">Make your move.</p>

      <div class="actions">
        <button id="reset-btn" class="reset-button">Reset Game</button>
      </div>
    </section>

    <section class="history-panel">
      <div class="history-header">
        <h2>Round History</h2>
        <span id="round-counter">0 rounds</span>
      </div>
      <ul id="history-list" class="history-list"></ul>
    </section>
  </div>
  <script src="index.js"></script>
</body>
</html>
