<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Recipe Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1>Recipe Explorer</h1>
      <p>Discover delicious recipes from around the world</p>
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for a recipe (e.g., paneer, dal, chana)..." autocomplete="off">
        <button id="search-btn">Search</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="hidden">Loading recipes...</div>
    <ul class="items" id="items">
      <!-- Recipes injected here -->
    </ul>
  </main>

  <div id="recipe-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close-btn">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
